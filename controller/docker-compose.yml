version: '3.8'

services:
  # Development Service
  controller-dev:
    build:
      context: .
      dockerfile: dev.dockerfile
    container_name: home-automation-controller-dev
    profiles:
      - development
      - dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:8875"
      - "9229:9229"  # Debug port
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source code for hot-reload
      - ./src:/app/src:ro
      - ./.env:/app/.env:ro
      # Use named volume for node_modules to avoid conflicts
      - node_modules_dev:/app/node_modules
      # If you need to persist data
      - ${DIR_PRINTER_PAPERLESS:-./data/scans}:/app/data/scans
      - ${DIR_PAPERLESS_CONSUME:-./data/paperless-consume}:/app/data/paperless-consume
      - ${DIR_PAPERLESS_EXPORT:-./data/paperless-exports}:/app/data/paperless-exports
      - ${DIR_SYNOLOGY_DOCS:-./data/nas}:/app/data/nas
    networks:
      - controller-network
    user: "${UID}:${GID}"
    labels:
      - "app=home-automation-controller"
      - "environment=development"
    # Uncomment if you need to access host services
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  # Production Service
  controller-prod:
    build:
      context: .
      dockerfile: prod.dockerfile
    container_name: home-automation-controller-prod
    profiles:
      - production
      - prod
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:8875"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # Mount only necessary directories for production
      # Adjust these based on your application needs
      - ${DIR_PRINTER_PAPERLESS:-./data/scans}:/app/data/scans
      - ${DIR_PAPERLESS_CONSUME:-./data/paperless-consume}:/app/data/paperless-consume
      - ${DIR_PAPERLESS_EXPORT:-./data/paperless-exports}:/app/data/paperless-exports
      - ${DIR_SYNOLOGY_DOCS:-./data/nas}:/app/data/nas
      - ./.env:/app/.env:ro
    networks:
      - controller-network
    user: "${UID}:${GID}"
    labels:
      - "app=home-automation-controller"
      - "environment=production"
    # Uncomment for production health monitoring
    # healthcheck:
    #   test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/status', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s

networks:
  controller-network:
    name: controller-network
    driver: bridge

volumes:
  node_modules_dev:
    name: controller-node-modules-dev
