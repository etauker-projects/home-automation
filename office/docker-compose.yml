services:

  hello-office:
    image: crccheck/hello-world
    container_name: hello-office
    networks:
      - proxy
    ports:
      - "9000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  office-postgres:
    image: docker.io/library/postgres:18
    container_name: office-postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres-admin -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ./data/office-postgres:/var/lib/postgresql
    networks:
      - postgres
    env_file: postgres-admin.env

  vikunja-postgres-init:
    image: postgres:18
    container_name: vikunja-postgres-init
    restart: "no"
    env_file:
      - postgres-admin.env
      - vikunja-postgres.env
    depends_on:
      office-postgres:
        condition: service_healthy
    volumes:
      - ./scripts/postgres-init.sh:/postgres-init.sh:ro
    networks:
      - postgres
    command: ["bash", "/postgres-init.sh"]

  vikunja-filesystem-init:
    image: alpine:3.20
    container_name: vikunja-filesystem-init
    restart: "no"
    environment:
      TARGET_DIR: "/data"
      TARGET_UID: 1000
      TARGET_GID: 1000
    volumes:
      - ./data/vikunja:/data
      - ./scripts/filesystem-init.sh:/filesystem-init.sh:ro
    command: ["sh", "/filesystem-init.sh"]

  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    restart: unless-stopped
    depends_on:
      vikunja-postgres-init:
        condition: service_completed_successfully
      vikunja-filesystem-init:
        condition: service_completed_successfully
    env_file:
      - vikunja-postgres.env
      - vikunja.env
    environment:
      VIKUNJA_SERVICE_PUBLICURL: https://vikunja.office.etauker.com
      VIKUNJA_AUTH_OPENID_ENABLED: true
      VIKUNJA_AUTH_OPENID_REDIRECT_URL: https://vikunja.office.etauker.com/auth/openid/
      VIKUNJA_AUTH_OPENID_PROVIDERS_0_NAME: Authentik
      VIKUNJA_AUTH_OPENID_PROVIDERS_0_AUTHURL: https://auth.security.etauker.com/application/o/vikunja/
      VIKUNJA_AUTH_OPENID_PROVIDERS_0_SCOPE: openid profile email
    volumes:
      - ./data/vikunja/files:/app/vikunja/files
      # - ./data/vikunja/config.yml:/app/vikunja/config.yml:ro
    networks:
      - postgres
      - proxy
    ports:
      - "9003:3456"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    depends_on:
      - paperless-postgress
      - paperless-redis
    networks:
      - paperless
      - proxy
    ports:
      - "9001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../data/office/paperless/data:/usr/src/paperless/data
      - ../data/office/paperless/media:/usr/src/paperless/media
      - /data/paperless/export:/usr/src/paperless/export
      - /data/paperless/consume:/usr/src/paperless/consume

    # Reference: http://docs.paperless-ngx.com/configuration
    environment:
      # Database and Redis configuration
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: paperless-postgress
      # File permissions for consumption directory
      # USERMAP_UID: 1000
      # USERMAP_GID: 1000
      user: 1000:984
      # Proxy config
      PAPERLESS_URL: https://paperless.office.etauker.com
      PAPERLESS_ALLOWED_HOSTS: paperless.office.etauker.com
      PAPERLESS_CSRF_TRUSTED_ORIGINS: https://paperless.office.etauker.com
      PAPERLESS_USE_X_FORWARD_HOST: true
      PAPERLESS_USE_X_FORWARD_PORT: true
      PAPERLESS_USE_X_FORWARD_PROTO: true
      # Time, language and locale
      PAPERLESS_TIME_ZONE: Europe/Dublin
      PAPERLESS_OCR_LANGUAGE: eng
      # PAPERLESS_OCR_LANGUAGES=tur ces   # Additional languages to install for OCR

  paperless-redis:
    image: docker.io/library/redis:8
    container_name: paperless-redis
    restart: unless-stopped
    volumes:
      - ../data/office/redis:/data
    networks:
      - paperless
    # environment:
    #   UID: 1000
    #   GID: 1000

  paperless-postgress:
    image: docker.io/library/postgres:18
    container_name: paperless-postgress
    restart: unless-stopped
    volumes:
      - ../data/office/postgresql/pgdata:/var/lib/postgresql
    networks:
      - paperless
    env_file: paperless-postgress.env

  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "9002:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"


networks:
  postgres:
    name: postgres
    external: false
  paperless:
    name: paperless
    external: false
  proxy:
    name: proxy
    external: true
